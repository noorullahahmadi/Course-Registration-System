{% extends "base.html" %}
{% block content %}
<div class="enrollment-history">

<div class="page-header">
  <h1>My Enrollment History</h1>
</div>

<div class="card-grid">

  {% for e in enrollments %}

  <div class="card">

    <h3>{{ e.course_name }}</h3>

    <p><b>Code:</b> {{ e.course_code }}</p>
    <p><b>Status:</b> {{ e.status }}</p>

    
     {% if e.status == "completed" %}
  <button class="btn btn-secondary" disabled>Completed</button>

{% elif e.status == "dropped" %}
  <button class="btn btn-danger btn-secondary" disabled>Dropped</button>

{% else %}
  <button class="btn btn-secondary" disabled>Enrolled</button>
{% endif %}

  </div>

  {% endfor %}

</div>
</div>

{% endblock %}
