name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  # ── JOB 1: TEST ──────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=.git,__pycache__

      - name: Run database tests
        run: |
          cd "Database Schema & Testing"
          python registration.py
          python reg_insert_data.py
          python test_database.py

  # ── JOB 2: BUILD ─────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t course-registration:latest .
          echo "✅ Docker image built successfully"

  # ── JOB 3: DEPLOY (Simulated) ────────────────────────────────
  deploy:
    name: Deploy (Simulated)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Simulate deployment
        run: |
          echo "================================="
          echo "  DEPLOYING TO PRODUCTION"
          echo "================================="
          echo "Branch : ${{ github.ref_name }}"
          echo "Commit : ${{ github.sha }}"
          echo "Time   : $(date -u)"
          echo "Status : ✅ Deployment successful"
          echo "================================="
